<!doctype html>
<html lang="fa-IR" dir="rtl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex,nofollow">
    <meta name="theme-color" content="#12211d">
    <title>صفحه پیدا نشد | چرخ کوک</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <style>
      *{box-sizing:border-box}body{min-height:100vh;margin:0;display:grid;place-items:center;padding:24px;background:#12211d;color:#fffcf6;font-family:Tahoma,"Segoe UI",sans-serif}.box{width:min(620px,100%);padding:clamp(32px,8vw,72px);border:1px solid rgba(255,252,246,.16);border-radius:28px;background:rgba(255,255,255,.04);text-align:center}.code{color:#c18a3d;font-size:.85rem;font-weight:800}h1{margin:12px 0;font-size:clamp(2rem,8vw,4rem)}p{margin:0 0 28px;color:rgba(255,252,246,.68);line-height:2}a{display:inline-flex;min-height:50px;align-items:center;padding:10px 24px;border-radius:999px;background:#c18a3d;color:#12211d;text-decoration:none;font-weight:800}
    </style>
  </head>
  <body>
    <main class="box">
      <div class="code">خطای ۴۰۴</div>
      <h1>این صفحه پیدا نشد</h1>
      <p>نشانی واردشده وجود ندارد یا جابه‌جا شده است.</p>
      <a href="/">بازگشت به صفحه اصلی</a>
    </main>
  </body>
</html>
